# patent_board SRE — Incident RCA Process
#
# patent_board는 B2B 특허 제품으로 24h 운영, 매일 배포. 인시던트 발생 시
# 이 프로세스가 RCA(Root Cause Analysis)를 안내한다.
#
# 목표: postmortem_complete = true 에 도달하기까지 아래 단계를 거침.
#   1. triage       → severity 평가 + on-call 엔지니어 지정
#   2. impact       → 영향 범위(사용자 수, 서비스) 파악
#   3. rca          → 근본 원인 식별
#   4. fix_applied  → 수정 조치 배포/확인
#   5. postmortem   → 포스트모템 문서 완성 + 온톨로지 기록
#
# ontorag-memory 연동: fix 단계와 postmortem 단계에서 AssertTriple로
# urn:ag:incident:<date>:<slug> 노드를 Fuseki에 기록한다.

process_uri: "urn:ontorag-flow:process:patent-board-sre-rca"
name: "patent_board SRE — Incident RCA"
description: >
  24h 운영 B2B 특허 플랫폼의 인시던트 대응 + 포스트모템 RCA 프로세스.
  ontorag-memory에 인시던트 결과를 기록해 미래 RCA에 활용한다.

allowed_actions:
  - "urn:ontorag-flow:action:UpdateCaseProperty"
  - "urn:ontorag-flow:action:SetGoal"
  - "urn:ontorag-flow:action:RequestHumanReview"
  - "urn:ontorag-flow:action:AssertTriple"

goal:
  postmortem_complete: true

initial_state:
  stage: "detected"        # detected → triaged → impact_assessed → rca_done → fixed → postmortem_complete
  severity: "unknown"      # P1 / P2 / P3
  on_call_assigned: false
  impact_users: 0
  root_cause: ""
  fix_deployed: false
  incident_uri: ""         # urn:ag:incident:<date>:<slug>

skeleton:
  - "urn:ontorag-flow:action:UpdateCaseProperty"   # triage: severity + on_call
  - "urn:ontorag-flow:action:UpdateCaseProperty"   # impact: impact_users
  - "urn:ontorag-flow:action:UpdateCaseProperty"   # rca: root_cause
  - "urn:ontorag-flow:action:AssertTriple"         # fix: ontorag-memory에 기록
  - "urn:ontorag-flow:action:UpdateCaseProperty"   # postmortem 완료

constraints:
  requires:
    - action: "urn:ontorag-flow:action:AssertTriple"
      requires: "urn:ontorag-flow:action:UpdateCaseProperty"  # rca 완료 후 기록

rules:
  # ── Stage: detected — 선행 조건 검증 ─────────────────────────────────────
  - name: "인시던트 URI 미설정 → 입력 요청"
    when:
      stage: "detected"
      incident_uri:
        eq: ""
    then:
      action: "urn:ontorag-flow:action:RequestHumanReview"
      params:
        reason: >
          incident_uri가 비어 있습니다.
          UpdateCaseProperty로 'incident_uri'를 설정한 후 진행해 주세요.
          형식: urn:ag:incident:YYYY-MM-DD:slug
          (예: urn:ag:incident:2026-06-27:api-timeout)
    confidence: 0.99
    rationale: >
      AssertTriple 실행 시 빈 subject URI 전달을 방지한다.
      incident_uri는 케이스 생성 시 --initial-state incident_uri=... 로 제공하거나
      첫 UpdateCaseProperty 액션으로 설정해야 한다.

  # ── Stage: detected → triaged ─────────────────────────────────────────────
  - name: "새 인시던트 → 트리아지 시작"
    when:
      stage: "detected"
    then:
      action: "urn:ontorag-flow:action:UpdateCaseProperty"
      params:
        key: "stage"
        value: "triaged"
    confidence: 0.9
    rationale: "인시던트가 감지되면 즉시 severity 평가 + on-call 지정이 필요하다."

  - name: "P1 인시던트 → on-call 즉시 호출"
    when:
      stage: "detected"
      severity: "P1"
    then:
      action: "urn:ontorag-flow:action:RequestHumanReview"
      params:
        reason: "P1 인시던트 — on-call 엔지니어 즉시 확인 필요."
    confidence: 0.98
    rationale: "P1은 자동 처리 불가. 사람이 즉시 대응해야 한다."

  # ── Stage: triaged → impact_assessed ──────────────────────────────────────
  - name: "트리아지 완료 → 영향 범위 파악"
    when:
      stage: "triaged"
      on_call_assigned: true
    then:
      action: "urn:ontorag-flow:action:UpdateCaseProperty"
      params:
        key: "stage"
        value: "impact_assessed"
    confidence: 0.85
    rationale: "on-call 배정 후 영향 받는 사용자 수와 서비스를 파악한다."

  # ── Stage: impact_assessed → rca_done ─────────────────────────────────────
  - name: "영향 파악 완료 → RCA 수행"
    when:
      stage: "impact_assessed"
    then:
      action: "urn:ontorag-flow:action:UpdateCaseProperty"
      params:
        key: "stage"
        value: "rca_done"
    confidence: 0.8
    rationale: "영향 범위를 알면 근본 원인 분석을 시작할 수 있다."

  # ── Stage: rca_done → fix + memory record ─────────────────────────────────
  - name: "RCA 완료 → 온톨로지에 인시던트 기록"
    when:
      stage: "rca_done"
      root_cause:
        ne: ""
      incident_uri:
        ne: ""
    then:
      action: "urn:ontorag-flow:action:AssertTriple"
      params:
        subject: "{{ incident_uri }}"
        predicate: "urn:ag:rel:rationale"
        object: "{{ root_cause }}"
    confidence: 0.9
    rationale: "RCA 결과를 ontorag-memory에 기록해 future 인시던트 패턴 분석에 활용한다."

  - name: "RCA 완료 → 수정 조치 배포"
    when:
      stage: "rca_done"
      root_cause:
        ne: ""
    then:
      action: "urn:ontorag-flow:action:UpdateCaseProperty"
      params:
        key: "fix_deployed"
        value: true
    confidence: 0.75
    rationale: "근본 원인이 확인되었으면 수정 조치를 배포한다."

  # ── Stage: fix_deployed → postmortem ──────────────────────────────────────
  - name: "수정 배포 후 → 포스트모템 완성"
    when:
      fix_deployed: true
      stage: "rca_done"
    then:
      action: "urn:ontorag-flow:action:UpdateCaseProperty"
      params:
        key: "postmortem_complete"
        value: true
    confidence: 0.7
    rationale: "수정이 확인되면 포스트모템 문서를 완성하고 케이스를 닫는다."
