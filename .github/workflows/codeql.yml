name: CodeQL

# GitHub-managed static analysis. Complements the local bandit job: bandit
# catches python-specific patterns we already enumerate; CodeQL adds the
# wider set of CWE queries GitHub maintains, and surfaces results in the
# Security tab.

on:
  # Personal-project posture: drop push/pull_request triggers because
  # CodeQL is a slow GitHub-managed analysis (~5–15 min) and a 1-person
  # repo doesn't benefit from running it on every commit. The weekly
  # cron still scans against new query packs, so the security floor
  # stays — only the per-commit latency is removed.
  schedule:
    - cron: "17 3 * * 0"  # Sunday 03:17 UTC
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:python
