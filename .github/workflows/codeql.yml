name: CodeQL

# GitHub-managed static analysis. Complements the local bandit job: bandit
# catches python-specific patterns we already enumerate; CodeQL adds the
# wider set of CWE queries GitHub maintains, and surfaces results in the
# Security tab.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Sunday 03:17 UTC — weekly check independent of activity, so dormant
    # branches still get scanned against new query packs.
    - cron: "17 3 * * 0"

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:python
