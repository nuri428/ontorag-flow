name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Allow only one CI run per ref at a time; cancel the previous one.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Ruff check
        run: uv run ruff check src tests examples

      - name: Ruff format check
        run: uv run ruff format --check src tests examples

  typecheck:
    name: Type check (pyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install all extras so optional deps resolve
        run: uv sync --all-extras

      - name: Run pyright
        run: uv run pyright src

  security:
    name: Security scan (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Run bandit
        run: uv run bandit -r src -c pyproject.toml

  deps:
    name: Dependency vulnerability scan (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install all runtime extras so pip-audit sees the full graph
        # We audit every extra users might install; if any transitive dep
        # has a CVE in a version we can resolve to, fail the build.
        run: uv sync --all-extras

      - name: Run pip-audit
        # --skip-editable skips the ontorag-flow source install itself
        # (no CVE database for our own package). Exit code is non-zero
        # when an actual vulnerability is found in a transitive dep —
        # that's what fails the build. Add --ignore-vuln <GHSA-id>
        # on a per-CVE basis if a transitive dependency has no fix yet.
        run: |
          uv run --with pip-audit pip-audit \
            --skip-editable --progress-spinner=off

  test:
    name: Test (pytest + coverage) — Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ matrix.python }}

      - name: Install dev dependencies
        run: uv sync --extra dev --python ${{ matrix.python }}

      - name: Run pytest
        run: uv run pytest --cov=src/ontorag_flow --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-py${{ matrix.python }}
          path: coverage.xml
          if-no-files-found: ignore

  postgres-integration:
    name: Postgres integration (testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dev + postgres extras
        run: uv sync --extra dev --extra postgres

      - name: Pre-pull Postgres image (faster than testcontainers' inline pull)
        run: docker pull postgres:16-alpine

      - name: Run live Postgres integration tests
        # Run only the integration file; disable coverage because the floor
        # is set for the full suite (the test job enforces it).
        run: uv run pytest tests/test_postgres_store_integration.py -v --no-cov

  demo:
    name: Reference demo smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Run medical-triage end-to-end demo
        run: uv run python examples/medical_triage/run_demo.py

      - name: Run supply-chain RCA demo (auto-suspend + resume)
        run: uv run python examples/supply_chain_rca/run_demo.py

      - name: Run supply-chain RCA LLM demo (fake mode, no API key)
        run: uv run python examples/supply_chain_rca/run_demo_llm.py

  docker:
    name: Docker image (build + /health smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build the image (with build cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ontorag-flow:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start the container
        run: |
          docker run -d --rm --name ontorag-flow-ci -p 8100:8100 ontorag-flow:ci
          # Wait for /health (give the lifespan a few seconds to open SQLite).
          for _ in $(seq 1 20); do
            if curl -fsS http://localhost:8100/health >/dev/null; then
              echo "service healthy"; exit 0
            fi
            sleep 1
          done
          echo "service never became healthy"; docker logs ontorag-flow-ci; exit 1

      - name: Stop the container
        if: always()
        run: docker rm -f ontorag-flow-ci 2>/dev/null || true
