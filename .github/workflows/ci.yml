name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Allow only one CI run per ref at a time; cancel the previous one.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Ruff check
        run: uv run ruff check src tests examples

      - name: Ruff format check
        run: uv run ruff format --check src tests examples

  test:
    name: Test (pytest + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Run pytest
        run: uv run pytest --cov=src/ontorag_flow --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  postgres-integration:
    name: Postgres integration (testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dev + postgres extras
        run: uv sync --extra dev --extra postgres

      - name: Pre-pull Postgres image (faster than testcontainers' inline pull)
        run: docker pull postgres:16-alpine

      - name: Run live Postgres integration tests
        run: uv run pytest tests/test_postgres_store_integration.py -v

  demo:
    name: Reference demo smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Run medical-triage end-to-end demo
        run: uv run python examples/medical_triage/run_demo.py
