name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Pages workflows need write access to id-token (for OIDC) and pages.
# `contents: read` is enough — we don't push back to the repo.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment in flight at a time. Newer pushes cancel
# in-progress builds since the older site is about to be replaced anyway.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build MkDocs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so edit_uri / git-revision plugins (later) work

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install docs deps
        run: uv sync --extra docs

      - name: Build (strict — broken links fail the build)
        run: uv run mkdocs build --strict

      - name: Configure Pages
        # enablement: true → if Pages isn't yet enabled on the repo with
        # "GitHub Actions" as the build source, this turns it on. Requires
        # the default GITHUB_TOKEN to have admin scope; if it fails, the
        # one-time manual fallback is Settings → Pages → Source: GitHub Actions.
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
