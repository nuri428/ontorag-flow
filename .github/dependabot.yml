# Monthly dependency PRs for the runtime/dev deps and the actions in CI.
# Personal-project cadence: monthly groups keep the PR queue quiet without
# losing coverage — GitHub's security advisories still raise *immediate*
# vulnerability PRs out-of-band regardless of this schedule, so the
# security floor doesn't drop. Grouping further reduces noise so a typical
# month is one PR per ecosystem instead of ten.

version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      python-runtime:
        patterns: ["*"]
        update-types: ["patch", "minor"]
      python-major:
        patterns: ["*"]
        update-types: ["major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
    groups:
      actions:
        patterns: ["*"]
