name: Bug report
description: Something does not work as documented or expected.
title: "bug: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The more concrete information
        you provide, the faster we can confirm and fix.

        For security issues do **not** open a public issue — use the private
        advisory link on the issue picker or see [SECURITY.md](../SECURITY.md).

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One sentence — what is broken?
      placeholder: "`audit prune` deletes open cases when --older-than is 1."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal commands or code that triggers the bug. Include the
        process YAML or action if the bug depends on one.
      render: bash
      placeholder: |
        ontorag-flow process load ./examples/triage.yaml
        ontorag-flow case create urn:p:triage
        ontorag-flow audit prune --older-than 1
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
      description: What did you expect? What happened instead?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      description: Paste relevant logs. Use ``` fences for long output.
      render: text

  - type: input
    id: version
    attributes:
      label: ontorag-flow version
      description: Output of `ontorag-flow --version`.
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: store
    attributes:
      label: Persistence backend
      options:
        - SQLite (default)
        - PostgreSQL
        - In-memory (tests)
    validations:
      required: true

  - type: dropdown
    id: engine
    attributes:
      label: Decision engine in use
      options:
        - Rule
        - Bayesian
        - Causal
        - LLM (Anthropic)
        - LLM (OpenAI)
        - LLM (Ollama)
        - Human review
        - Stacked
        - Cascade
        - Not applicable / unsure

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.7"
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment (OS, deployment)
      placeholder: "macOS 14.5, Docker, single-node"

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched [open and closed issues](https://github.com/nuri428/ontorag-flow/issues?q=is%3Aissue) for duplicates.
          required: true
        - label: I confirmed this is not a security issue (those go to [private advisories](https://github.com/nuri428/ontorag-flow/security/advisories/new)).
          required: true
